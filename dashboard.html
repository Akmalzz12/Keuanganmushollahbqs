<script>

/* =========================
   AMBIL ANGKA
========================= */

function ambilAngka(nominal){

  if(
    nominal === undefined ||
    nominal === null ||
    nominal === ""
  ){
    return 0;
  }

  return Number(nominal) || 0;

}

/* =========================
   HITUNG TOTAL
========================= */

function hitungTotal(tipe){

  let total = 0;

  Object.values(transaksi).forEach(list => {

    list.forEach(item => {

      const tipeItem =
      String(item.tipe)
      .trim()
      .toLowerCase();

      if(tipeItem === tipe){

        total += ambilAngka(item.nominal);

      }

    });

  });

  return total;

}

/* =========================
   TOTAL & SALDO
========================= */

const totalPemasukan =
hitungTotal("pemasukan");

const totalPengeluaran =
hitungTotal("pengeluaran");

const saldo =
totalPemasukan - totalPengeluaran;

const saldoElement =
document.getElementById("saldo");

function animasiSaldo(target){

let dots = 0;

/* =========================
   LOADING MENGHITUNG
========================= */

const loadingInterval =
setInterval(()=>{

dots++;

if(dots > 3){
dots = 1;
}

saldoElement.innerText =
"Menghitung" + ".".repeat(dots);

},200);

/* =========================
   ANIMASI ANGKA
========================= */

setTimeout(()=>{

clearInterval(loadingInterval);

let current = 0;

const increment =
target / 80;

const interval =
setInterval(()=>{

current += increment;

if(current >= target){

current = target;

clearInterval(interval);

/* =========================
   EFEK KEDIP
========================= */

saldoElement.animate(

[
{ opacity:1 },
{ opacity:.2 },
{ opacity:1 },
{ opacity:.2 },
{ opacity:1 },
{ opacity:.2 },
{ opacity:1 }
],

{
duration:1000
}

);

}

saldoElement.innerText =
"Rp " +
Math.floor(current)
.toLocaleString("id-ID");

},15);

},3000);

}

animasiSaldo(saldo);

/* =========================
   LAST UPDATE
========================= */

document.getElementById("update")
.innerText = lastUpdate;

/* =========================
   PILIH BULAN
========================= */

const selectBulan =
document.getElementById("pilih-bulan");

daftarBulan.forEach((bulan)=>{

  const option =
  document.createElement("option");

  option.value = bulan;

  option.textContent = bulan;

  selectBulan.appendChild(option);

});

selectBulan.value = "Mei 2026";

/* =========================
   FILTER TIPE
========================= */

let tipeAktif =
"pemasukan";

let scrollPositions = {

  pemasukan:0,
  pengeluaran:0

};

const buttons =
document.querySelectorAll(".menu-btn");

buttons.forEach((btn)=>{

  btn.addEventListener("click",()=>{

    scrollPositions[tipeAktif] =
    window.scrollY;

    buttons.forEach((b)=>{
      b.classList.remove("active");
    });

    btn.classList.add("active");

    tipeAktif =
    btn.dataset.tipe;

    tampilkanTransaksi();

    window.scrollTo({

      top:
      scrollPositions[tipeAktif],

      behavior:"smooth"

    });

  });

});

/* =========================
   TAMPIL TRANSAKSI
========================= */

const list =
document.getElementById("riwayat-list");

function tampilkanTransaksi(){

  const bulanDipilih =
  selectBulan.value;

  const dataBulan =
  transaksi[bulanDipilih] || [];

  let html = "";
  let total = 0;

  dataBulan.forEach((item)=>{

    const tipeItem =
    String(item.tipe)
    .trim()
    .toLowerCase();

    if(tipeItem === tipeAktif){

      const angka =
      ambilAngka(item.nominal);

      total += angka;

      html += `

      <div class="item">

        <div class="item-left">

          <h3>${item.title}</h3>

          <p>${item.tanggal}</p>

        </div>

        <div class="
          nominal
          ${tipeItem}
        ">

          ${tipeItem === "pemasukan" ? "+" : "-"}Rp ${angka.toLocaleString("id-ID")}

        </div>

      </div>

      `;

    }

  });

  list.innerHTML = html;

  const grandTotal =
  document.getElementById("grand-total");

  grandTotal.innerText =
  "Rp " +
  total.toLocaleString("id-ID");

  if(tipeAktif === "pemasukan"){

    grandTotal.style.color =
    "#16a34a";

  } else {

    grandTotal.style.color =
    "#ef4444";

  }

}

tampilkanTransaksi();

/* =========================
   GANTI BULAN
========================= */

selectBulan.addEventListener(
"change",
()=>{

  tampilkanTransaksi();

  window.scrollTo({

    top:0,
    behavior:"smooth"

  });

}
);

/* =========================
   SCROLL TO TOP
========================= */

const scrollBtn =
document.getElementById(
"scrollTopBtn"
);

window.addEventListener(
"scroll",
()=>{

if(window.scrollY > 200){

scrollBtn.style.display =
"flex";

} else {

scrollBtn.style.display =
"none";

}

});

scrollBtn.addEventListener(
"click",
()=>{

window.scrollTo({

top:0,
behavior:"smooth"

});

});

/* =========================
   SIDEBAR
========================= */

const menuBtn =
document.getElementById("menuBtn");

const sidebar =
document.getElementById("sidebar");

const overlay =
document.getElementById("overlay");

const closeSidebar =
document.getElementById("closeSidebar");

menuBtn.addEventListener("click",()=>{

sidebar.classList.add("active");
overlay.classList.add("active");

});

overlay.addEventListener("click",()=>{

sidebar.classList.remove("active");
overlay.classList.remove("active");

});

closeSidebar.addEventListener("click",()=>{

sidebar.classList.remove("active");
overlay.classList.remove("active");

});

</script>

<script>

document
.getElementById("downloadPdf")

const { jsPDF } = window.jspdf;

const doc = new jsPDF();

/* =========================

========================= */

const logo = new Image();

logo.src = "logo.png";

logo.onload = function(){

/* =========================

========================= */

doc.addImage(

"PNG",
15,
10,
22,
22
);

/* =========================
   HEADER
========================= */

doc.setFont("helvetica","bold");

doc.setFontSize(18);

doc.text(
"MUSHOLLAH BAQIATUS SHOLIHAT",
105,
18,
{ align:"center" }
);

doc.setFontSize(11);

doc.setFont("helvetica","normal");

doc.text(
"Website Kas Keuangan Mushollah",
105,
25,
{ align:"center" }
);

doc.text(
"Dicetak Otomatis Dari Sistem",
105,
31,
{ align:"center" }
);

/* garis */

doc.setLineWidth(.8);

doc.line(14,40,196,40);

/* =========================
   JUDUL
========================= */

doc.setFont("helvetica","bold");

doc.setFontSize(15);

doc.text(
"LAPORAN KEUANGAN",
105,
50,
{ align:"center" }
);

doc.setFontSize(11);

doc.setFont("helvetica","normal");

doc.text(
"Periode: " + selectBulan.value,
105,
57,
{ align:"center" }
);

/* =========================
   RINGKASAN
========================= */

doc.setFontSize(11);

doc.text(
"Tanggal Cetak: " +
new Date().toLocaleDateString("id-ID"),
14,
70
);

doc.text(
"Total Pemasukan: Rp " +
totalPemasukan.toLocaleString("id-ID"),
14,
78
);

doc.text(
"Total Pengeluaran: Rp " +
totalPengeluaran.toLocaleString("id-ID"),
14,
86
);

doc.text(
"Saldo Akhir: Rp " +
saldo.toLocaleString("id-ID"),
14,
94
);

/* =========================
   DATA TRANSAKSI
========================= */

const dataBulan =
transaksi[selectBulan.value] || [];

const rows = [];

dataBulan.forEach(item=>{

const nominal =
ambilAngka(item.nominal);

rows.push([

item.tanggal,

item.title,

item.tipe,

"Rp " +
nominal.toLocaleString("id-ID")

]);

});

/* =========================
   TABLE
========================= */

doc.autoTable({

startY:105,

head:[[
"Tanggal",
"Keterangan",
"Tipe",
"Nominal"
]],

body:rows,

styles:{
fontSize:10
},

headStyles:{
fillColor:[37,99,235]
},

columnStyles:{
3:{
halign:"right"
}
}

});

/* =========================
   TTD
========================= */

const finalY =
doc.lastAutoTable.finalY;

doc.text(
"Mengetahui,",
150,
finalY + 25
);

doc.text(
"DKM Mushollah",
150,
finalY + 32
);

doc.text(
"(________________)",
150,
finalY + 55
);

/* =========================
   FOOTER
========================= */

doc.setFontSize(9);

doc.text(
"Dicetak otomatis oleh sistem kas Mushollah",
105,
285,
{ align:"center" }
);

/* =========================
   DOWNLOAD
========================= */

doc.save(
"Laporan-" +
selectBulan.value +
".pdf"
);

};

});

</script>
