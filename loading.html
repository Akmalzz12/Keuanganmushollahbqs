<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Loading</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:sans-serif;
}

body{
background:#f5f7fb;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

.loading-box{
display:flex;
flex-direction:column;
align-items:center;
gap:24px;
padding:30px;
text-align:center;
}

.loader{
width:70px;
height:70px;
border:6px solid #dbeafe;
border-top:6px solid #2563eb;
border-radius:50%;
animation:spin 1s linear infinite;
box-shadow:
0 10px 30px rgba(37,99,235,.15);
}

@keyframes spin{

0%{
transform:rotate(0deg);
}

100%{
transform:rotate(360deg);
}

}

.loading-title{
font-size:22px;
font-weight:700;
color:#111827;
font-family:'Poppins',sans-serif;
}

.loading-text{
font-size:15px;
line-height:1.6;
color:#6b7280;
max-width:260px;
}

.dot::after{
content:"";
animation:dots 1.5s infinite;
}

@keyframes dots{

0%{
content:"";
}

33%{
content:".";
}

66%{
content:"..";
}

100%{
content:"...";
}

}

</style>

</head>

<body>

<div class="loading-box">

<div class="loader"></div>

<div>

<h1 class="loading-title">
Memuat Data
</h1>

<p class="loading-text">

Tunggu sebentar ya,
data sedang disesuaikan
<span class="dot"></span>

</p>

</div>

</div>

<script>

/* simulasi loading */

setTimeout(()=>{

window.location.href =
"dashboard.html";

},2500);

</script>

</body>
</html>
