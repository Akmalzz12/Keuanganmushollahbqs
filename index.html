<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Keuangan</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="login-box">

    <h1>Login</h1>

    <p>Silakan masuk ke akun Anda</p>

    <div class="input-group">
      <label>Username:</label>

      <input
        type="text"
        id="username"
        placeholder="Masukkan username">
    </div>

    <div class="input-group">
      <label>Password:</label>

      <input
        type="text"
        id="password"
        placeholder="Masukkan password">
    </div>

    <div class="checkbox-group">

      <input
        type="checkbox"
        id="agreement">

      <label for="agreement">
        Saya setuju tidak akan membagikan username atau password di luar anggota DKM
      </label>

    </div>

    <button
      class="login-btn"
      onclick="login()">

      Masuk

    </button>

    <div class="footer-text">
      Sistem Pencatatan Keuangan Mushollah Baqiatus Sholihat
    </div>

  </div>

  <script>

function login(){

  const username =
  document.getElementById("username").value;

  const password =
  document.getElementById("password").value;

  const agreement =
  document.getElementById("agreement").checked;

  if(!agreement){

    alert(
      "Silakan centang persetujuan terlebih dahulu"
    );

    return;
  }

  const userBenar = "Mei";

  const daftarPassword = [

    "5725",
    "5000",
    "5811",
    "8419",
    "1449",
    "5061",
    "5542",
    "2035",
    "8918",
    "7178",
    "5003",
    "9060",
    "8995",
    "9739",
    "7554",
    "7617",
    "0072"

  ];

  if(
    username === userBenar &&
    daftarPassword.includes(password)
  ){

    sessionStorage.setItem(
      "login",
      "true"
    );

    window.location.href =
    "loading.html";

  }else{

    alert(
      "Username atau password salah"
    );

  }

}

  </script>

</body>
</html>
