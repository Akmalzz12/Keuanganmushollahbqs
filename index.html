<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Keuangan</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="welcome-header">
  <img src="gambar/icon.png" alt="Logo Musholla" class="logo-musholla">
  <h2>
    Selamat
    <img class="wave-icon" src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/1f44b.png" alt="wave">
    <br>Datang kembali
  </h2>
  <p>Silahkan masuk untuk melanjutkan ke halaman dashboard</p>
</div>

  <div class="login-box">

    <h1>Masuk</h1>

    <p>Silahkan masuk ke akun Anda</p>

    <div class="input-group">
      <label>Username:</label>
      <div class="input-wrapper">
        <input type="text" id="username" placeholder="Masukkan username">
        <svg class="check-icon" id="check-username" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>
    </div>

    <div class="input-group">
      <label>Password:</label>
      <div class="input-wrapper">
        <input type="text" id="password" placeholder="Masukkan password">
        <svg class="check-icon" id="check-password" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>
    </div>

    <button
      class="login-btn"
      onclick="login()">

      Masuk

    </button>

    <div class="footer-text">
      Sistem Pencatatan Keuangan Mushollah Baqiatus Sholihat
    </div>

  </div>

  <div id="toast" class="toast">
  <svg class="toast-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="white">
  <path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/>
</svg>
  <span id="toast-text"></span>
</div>

  <script>

function showToast(message, type = "error") {
  const toast = document.getElementById("toast");
  const toastText = document.getElementById("toast-text");

  toastText.textContent = message;
  toast.className = "toast " + type + " show";

  setTimeout(() => {
    toast.className = "toast " + type;
  }, 3000);
}

const userBenar = "Baqiatus";

const daftarPassword = [
  "5725","5000","5811","8419","1449","5061","5542",
  "2035","8918","7178","5003","9060","8995","9739",
  "7554","7617","0072","0000"
];

const usernameInput = document.getElementById("username");
const passwordInput = document.getElementById("password");
const checkUsername = document.getElementById("check-username");
const checkPassword = document.getElementById("check-password");

usernameInput.addEventListener("input", () => {
  const val = usernameInput.value.trim();
  if(val === userBenar){
    checkUsername.classList.add("show");
  } else {
    checkUsername.classList.remove("show");
  }
});

passwordInput.addEventListener("input", () => {
  const val = passwordInput.value.trim();
  if(daftarPassword.includes(val)){
    checkPassword.classList.add("show");
  } else {
    checkPassword.classList.remove("show");
  }
});

function login(){

const username = document.getElementById("username").value.trim();

const password = document.getElementById("password").value.trim();

  if(username === "" && password === ""){
    showToast("Mohon isi Username & Password", "warning");
    return;
  }

  if(username === ""){
    showToast("Mohon isi Username", "warning");
    return;
  }

  if(password === ""){
    showToast("Mohon isi Password", "warning");
    return;
  }

  if(
    username === userBenar &&
    daftarPassword.includes(password)
  ){

    sessionStorage.setItem(
      "login",
      "true"
    );

    window.location.href =
    "loading.html";

  }else{

    showToast("Username atau Password salah", "error");

  }

}

  </script>

</body>
</html>
