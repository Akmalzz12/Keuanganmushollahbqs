<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Keuangan</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="welcome-header">
  <h2>Selamat<br>Datang kembali</h2>
  <p>Silahkan masuk untuk melanjutkan ke halaman dashboard Anda</p>
  </div>

  <div class="login-box">

    <h1>Masuk</h1>

    <p>Silakan masuk ke akun Anda</p>

    <div class="input-group">
      <label>Username:</label>

      <input
        type="text"
        id="username"
        placeholder="Masukkan username">
    </div>

    <div class="input-group">
      <label>Password:</label>

      <input
        type="text"
        id="password"
        placeholder="Masukkan password">
    </div>

    <button
      class="login-btn"
      onclick="login()">

      Masuk

    </button>

    <div class="footer-text">
      Sistem Pencatatan Keuangan Mushollah Baqiatus Sholihat
    </div>

  </div>

  <div id="toast" class="toast"></div>

  <script>

function showToast(message, type = "error") {
  const toast = document.getElementById("toast");
  toast.textContent = message;
  toast.className = "toast " + type + " show";

  setTimeout(() => {
    toast.className = "toast " + type;
  }, 3000);
}

function login(){

  const username =
  document.getElementById("username").value;

  const password =
  document.getElementById("password").value;

  const userBenar = "Baqiatus";

  const daftarPassword = [

    "5725",
    "5000",
    "5811",
    "8419",
    "1449",
    "5061",
    "5542",
    "2035",
    "8918",
    "7178",
    "5003",
    "9060",
    "8995",
    "9739",
    "7554",
    "7617",
    "0072",
    "0000"

  ];

  if(
    username === userBenar &&
    daftarPassword.includes(password)
  ){

    sessionStorage.setItem(
      "login",
      "true"
    );

    window.location.href =
    "loading.html";

  }else{

    showToast("Username atau Password salah", "error");

  }

}

  </script>

</body>
</html>
