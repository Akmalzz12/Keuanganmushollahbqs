<style>

@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f5f7fb;
color:#111827;
overflow-x:hidden;
}

/* NAVBAR */

.navbar{
position:sticky;
top:0;
left:0;
width:100%;
height:64px;
background:white;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 10px;
box-shadow:0 6px 18px rgba(0,0,0,.05);
z-index:1000;
}

.navbar-title{
font-size:20px;
font-weight:700;
font-family:'Poppins',sans-serif;
color:#59B292;
}

.navbar-left{
display:flex;
align-items:center;
gap:10px;
}

.back-btn{
display:flex;
align-items:center;
justify-content:center;
text-decoration:none;
color:#59B292;
}

/* HAMBURGER */

.menu-btn{
border:none;
background:none;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:6px;
cursor:pointer;
padding:4px;
width:42px;
height:42px;
}

.menu-btn span{
width:26px;
height:2.8px;
background:#59B292;
border-radius:999px;
}

/* OVERLAY */

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.35);
opacity:0;
visibility:hidden;
transition:.25s;
z-index:1500;
}

.overlay.active{
opacity:1;
visibility:visible;
}

/* SIDEBAR */

.sidebar{
position:fixed;
top:0;
left:0;
width:78%;
max-width:300px;
height:100vh;
background:white;
padding:24px 18px;
box-shadow:0 10px 30px rgba(0,0,0,.12);
transform:translateX(-100%);
transition:.3s ease;
z-index:2000;
display:flex;
flex-direction:column;
}

.sidebar.active{
transform:translateX(0);
}

.sidebar-top{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:26px;
}

.sidebar-title{
font-size:22px;
font-weight:700;
}

.close-btn{
width:40px;
height:40px;
border:none;
border-radius:12px;
background:#f1f5f9;
font-size:18px;
cursor:pointer;
}

/* MENU */

.sidebar-menu{
display:flex;
flex-direction:column;
gap:12px;
}

.sidebar-item{
display:flex;
align-items:center;
gap:14px;
padding:16px;
border-radius:20px;
background:#f8fafc;
text-decoration:none;
border:1px solid #e5e7eb;
color:#111827;
}

.sidebar-icon{
display:flex;
align-items:center;
justify-content:center;
width:42px;
height:42px;
min-width:42px;
border-radius:12px;
background:#eff6ff;
color:#2563eb;
}

.sidebar-text{
display:flex;
flex-direction:column;
justify-content:center;
}

.sidebar-text h3{
font-size:15px;
font-weight:600;
margin:0;
line-height:1.2;
}

.sidebar-text p{
font-size:12px;
color:#64748b;
margin-top:2px;
line-height:1.2;
}

/* =========================
   BOTTOM NAVIGATION
========================= */

.bottom-nav{
position:fixed;
bottom:0;
left:0;
width:100%;
height:72px;
background:#fff;
border-top:1px solid #e5e7eb;
display:flex;
justify-content:space-around;
align-items:center;
z-index:999;
box-shadow:0 -4px 20px rgba(0,0,0,.06);
}

.bottom-item{
flex:1;
height:100%;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:4px;
text-decoration:none;
border:none;
background:none;
cursor:pointer;
color:#94a3b8;
transition:.2s;
}

.bottom-item svg{
width:22px;
height:22px;
}

.bottom-item small{
font-size:12px;
font-weight:600;
}

.bottom-item.active{
color:#2563eb;
}

.bottom-item:active{
transform:scale(.95);
}

.icon-pill{
display:flex;
align-items:center;
justify-content:center;
padding:3px 14px;
border-radius:999px;
transition:.3s;
}

.bottom-item.active .icon-pill{
background:#dbeafe;
}

.bottom-item.active svg{
color:#2563eb;
}

/* CONTAINER INFO */

.container-info{
  padding:15px;
  display:flex;
  flex-direction:column;
  gap:20px;
  padding-bottom:100px;
  padding-top:20px;
}

.info-card{
  width:100%;
  background:#fff;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 10px 25px rgba(0,0,0,.08);
  transition:.3s;
}

.banner-wrapper{
  position:relative;
  width:100%;
}

.info-banner{
  width:100%;
  height:auto;
  display:block;
  border-top-left-radius:20px;
  border-top-right-radius:20px;
}

.info-content{
  padding:20px;
}

/* BADGE */
.info-badges{
  display:flex;
  gap:8px;
  margin-bottom:15px;
  flex-wrap:wrap;
}

.info-badge{
  display:inline-block;
  font-size:10px;
  padding:4px 8px;
  border-radius:999px;
  font-weight:600;
}

.info-badge.status{
  background:#2563eb;
  color:white;
}

.info-badge.access{
  background:#dcfce7;
  color:#15803d;
}

.info-badge.private{
  background:#fee2e2;
  color:#b91c1c;
}

.info-badge.countdown{
  background:#fff7ed;
  color:#ea580c;
}

@keyframes pulse{
  0%{ box-shadow:0 0 0 0 rgba(234,88,12,.7); }
  70%{ box-shadow:0 0 0 5px rgba(234,88,12,0); }
  100%{ box-shadow:0 0 0 0 rgba(234,88,12,0); }
}

.info-badge.blink{
  animation:pulse 1.3s infinite;
}

/* TITLE & DESC */
.info-title{
  font-size: 18px;
  margin-bottom: 10px;
  color: #111827;
}

.info-desc{
  margin-bottom: 15px;
}

.info-desc p{
  font-size: 13px;
  color: #4b5563;
  line-height: 1.7;
  margin-bottom: 12px;
}

.info-desc p:last-child{
  margin-bottom: 0;
}

/* META */
.info-meta{
  display: flex;
  flex-direction: column;
  gap: 6px;
  font-size: 13px;
  color: black;
  border-top: 1px solid #e5e7eb;
  padding-top: 12px;
  font-weight: 400;
}

.youtube-link {
  color: #ef4444;
  font-weight: 600;
  text-decoration: none;
}

.youtube-link:active {
  text-decoration: underline;
}

.link-belum-ada {
  color: #94a3b8;
  font-style: italic;
}

/* EMPTY STATE */
.empty-info{
  text-align:center;
  padding:200px 30px;
}

.empty-info h3{
  font-size:18px;
  color:#111827;
  margin-bottom:8px;
  font-weight:600;
}

.empty-info p{
  font-size:14px;
  color:#6b7280;
  line-height:1.6;
}

</style>

</head>

<script>

if(sessionStorage.getItem("login") !== "true"){

window.location.href = "index.html";

}

const menuBtn =
document.getElementById(
"menuBtn"
);

const sidebar =
document.getElementById(
"sidebar"
);

const overlay =
document.getElementById(
"overlay"
);

const closeBtn =
document.getElementById(
"closeBtn"
);

menuBtn.addEventListener(
"click",
()=>{

sidebar.classList.add(
"active"
);

overlay.classList.add(
"active"
);

}
);

overlay.addEventListener(
"click",
()=>{

sidebar.classList.remove(
"active"
);

overlay.classList.remove(
"active"
);

}
);

closeBtn.addEventListener(
"click",
()=>{

sidebar.classList.remove(
"active"
);

overlay.classList.remove(
"active"
);

}
);

/* =========================
   DATA BERITA
   Ganti tampilkan: true/false buat nampilin/sembunyiin
========================= */

const daftarBerita = [
  {
    id: 1,
    tampilkan: true,
    gambar: "gambar/banner.png",
    judul: "Majelis Taklim Ustadz Fatih",
    deskripsi: [
      "Lorem ipsum dolor sit amet, konten deskripsi ini masih asal-asalan dulu buat contoh tampilan. Nanti bisa diganti dengan informasi acara yang sebenarnya.",
      "Paragraf kedua ini juga masih placeholder, tinggal disesuaikan lagi sama isi pengumuman yang mau ditampilkan ke jamaah musholla nantinya."
    ],
    tanggal: "12 Juli 2026",
    tempat: "Musholla Baqiatus Sholihat",
    tanggalEvent: "2026-07-12",
    linkStreaming: null,
    akses: "Umum"
  },
  {
    id: 2,
    tampilkan: false,
    gambar: "gambar/banner2.png",
    judul: "Peringatan Isra Mi'raj",
    deskripsi: [
      "Deskripsi berita kedua di sini, masih placeholder juga.",
      "Paragraf kedua untuk berita kedua ini."
    ],
    tanggal: "15 Juli 2026",
    tempat: "Musholla Baqiatus Sholihat",
    tanggalEvent: "2026-07-15",
    linkStreaming: "",
    akses: "Umum"
  }
];

/* =========================
   FUNGSI COUNTDOWN
========================= */

function updateCountdown(id, eventDate){

  const today = new Date();
  today.setHours(0,0,0,0);

  const event = new Date(eventDate);
  event.setHours(0,0,0,0);

  const diff = Math.ceil((event - today) / (1000 * 60 * 60 * 24));

  const badge = document.getElementById(id);

  if(diff > 1){
    badge.textContent = diff + " Hari Lagi";
  } else if(diff === 1){
    badge.textContent = "Besok";
  } else if(diff === 0){
    badge.textContent = "Hari Ini";
    badge.classList.add("blink");
  } else {
    badge.textContent = "Selesai";
  }

}

/* =========================
   FUNGSI STREAMING INFO
========================= */

function updateStreamingInfo(id, link){

  const el = document.getElementById(id);

  if(link === null){
    el.style.display = "none";
    return;
  }

  if(!link || link.trim() === ""){
    el.innerHTML = "🎥 Live Streaming: <span class='link-belum-ada'>Akan Mendatang</span>";
  } else {
    el.innerHTML = `🎥 Live Streaming: <a href="${link}" target="_blank" class="youtube-link">Klik Disini</a>`;
  }

}

/* =========================
   RENDER BERITA
========================= */

function renderBerita(){

  const container = document.getElementById("containerInfo");
  const emptyState = document.getElementById("emptyState");

  const beritaAktif = daftarBerita.filter(b => b.tampilkan === true);

  if(beritaAktif.length === 0){
    container.style.display = "none";
    emptyState.style.display = "block";
    return;
  }

  container.style.display = "flex";
  emptyState.style.display = "none";

  let html = "";

  beritaAktif.forEach((berita) => {

    html += `
      <div class="info-card">
        <div class="banner-wrapper">
          <img src="${berita.gambar}" alt="Banner Informasi" class="info-banner">
        </div>
        <div class="info-content">
          <div class="info-badges">
            <span class="info-badge status" id="countdown${berita.id}">Memuat...</span>
            <span class="info-badge access">${berita.akses}</span>
          </div>
          <h2 class="info-title">${berita.judul}</h2>
          <div class="info-desc">
            ${berita.deskripsi.map(p => `<p>${p}</p>`).join("")}
          </div>
          <div class="info-meta">
            <span>📅 Tanggal: ${berita.tanggal}</span>
            <span>📍 Tempat: ${berita.tempat}</span>
            <span id="streaming-info-${berita.id}"></span>
          </div>
        </div>
      </div>
    `;

  });

  container.innerHTML = html;

  beritaAktif.forEach((berita) => {
    updateCountdown("countdown" + berita.id, berita.tanggalEvent);
    updateStreamingInfo("streaming-info-" + berita.id, berita.linkStreaming);
  });

}

renderBerita();

</script>
